<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会议全流程进度跟踪表</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f1f5f9;color:#1e293b;padding:1.5rem}
.container{max-width:1400px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem}
.header-left h1{font-size:1.4rem;font-weight:600;color:#0f172a}
.header-left p{font-size:.85rem;color:#64748b;margin-top:.2rem}
.status-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px}
.status-dot.on{background:#22c55e}
.status-dot.off{background:#ef4444;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.header-actions{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
.btn{background:#6366f1;color:#fff;border:none;border-radius:8px;padding:.45rem 1rem;font-size:.85rem;font-weight:500;cursor:pointer;transition:background .15s;white-space:nowrap}
.btn:hover{background:#4f46e5}
.btn.green{background:#22c55e}.btn.green:hover{background:#16a34a}
.btn.red{background:#ef4444}.btn.red:hover{background:#dc2626}
.stats-bar{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem}
.stat-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:.75rem 1.25rem;flex:1;min-width:120px}
.stat-card .num{font-size:1.5rem;font-weight:700;color:#0f172a}
.stat-card .label{font-size:.75rem;color:#64748b;margin-top:2px}
.stat-card.green .num{color:#16a34a}
.stat-card.blue .num{color:#2563eb}
.add-row{background:#fff;border:1px dashed #cbd5e1;border-radius:10px;padding:.75rem 1rem;display:flex;gap:.75rem;align-items:center;margin-bottom:.75rem}
.add-row:focus-within{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
.add-row input{flex:1;border:none;outline:none;font-size:.9rem;padding:.4rem 0;background:transparent}
.add-row input::placeholder{color:#94a3b8}
.table-wrap{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow-x:auto;box-shadow:0 1px 3px rgba(0,0,0,.04)}
table{width:100%;border-collapse:collapse;min-width:1000px}
thead{position:sticky;top:0;z-index:2}
thead th{background:#f8fafc;border-bottom:2px solid #e2e8f0;padding:.75rem .6rem;font-size:.78rem;font-weight:600;color:#475569;text-align:center;white-space:nowrap}
thead th:first-child{text-align:left;padding-left:1rem;width:180px}
thead th:last-child{width:80px;text-align:center}
thead th .step-num{display:block;font-size:.6rem;color:#94a3b8;font-weight:400;margin-top:1px}
tbody tr{border-bottom:1px solid #f1f5f9;transition:background .15s}
tbody tr:hover{background:#f8fafc}
tbody tr:last-child{border-bottom:none}
tbody td{padding:.5rem .4rem;text-align:center;vertical-align:middle}
tbody td:first-child{text-align:left;padding-left:1rem;font-size:.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.cell-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;width:44px;height:44px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;cursor:pointer;transition:all .2s;padding:2px}
.cell-btn:hover{border-color:#94a3b8;background:#f8fafc}
.cell-btn.done{background:#f0fdf4;border-color:#86efac}
.cell-btn.done:hover{border-color:#4ade80;background:#dcfce7}
.cell-btn .icon{font-size:.9rem;line-height:1;color:#cbd5e1;transition:all .2s}
.cell-btn.done .icon{color:#22c55e}
.cell-btn .date-label{font-size:.55rem;color:#94a3b8;margin-top:1px;line-height:1}
.cell-btn.done .date-label{color:#22c55e;font-weight:500}
.progress-cell{display:flex;flex-direction:column;align-items:center;gap:3px}
.mini-bar-bg{width:60px;height:4px;background:#e2e8f0;border-radius:99px;overflow:hidden}
.mini-bar-fill{height:100%;width:0%;background:#22c55e;border-radius:99px;transition:width .3s}
.progress-cell .pct{font-size:.75rem;font-weight:600;color:#64748b}
.progress-cell .pct.done{color:#16a34a}
.action-btns{display:flex;gap:4px;justify-content:center}
.action-btns .abtn{background:none;border:1px solid transparent;border-radius:6px;padding:4px 7px;cursor:pointer;font-size:.78rem;transition:all .15s;white-space:nowrap}
.abtn.del{color:#94a3b8}.abtn.del:hover{color:#dc2626;border-color:#fca5a5;background:#fef2f2}
.online-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:.75rem;font-weight:500}
.online-badge.on{background:#f0fdf4;color:#166534}
.online-badge.off{background:#fef2f2;color:#991b1b}
@media(max-width:768px){body{padding:.75rem}.header{flex-direction:column}.stats-bar .stat-card{min-width:80px;padding:.5rem .75rem}.stat-card .num{font-size:1.1rem}.cell-btn{width:36px;height:36px}thead th{font-size:.7rem}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <div style="display:flex;align-items:center;gap:.5rem;">
        <h1>会议全流程进度跟踪表</h1>
        <span id="statusBadge" class="online-badge off">○ 未连接</span>
      </div>
      <p id="summaryText" style="margin-top:.2rem;font-size:.85rem;color:#64748b">加载中...</p>
    </div>
    <div class="header-actions">
      <button class="btn green" onclick="exportCSV()">导出 CSV</button>
      <button class="btn red" onclick="resetAll()">重置所有</button>
    </div>
  </div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="add-row">
    <input id="newName" placeholder="输入会议名称，例如：7月销售总结会" onkeydown="if(event.key==='Enter')addMeeting()">
    <button class="btn" onclick="addMeeting()">+ 添加会议</button>
  </div>
  <div class="table-wrap">
    <table><thead><tr id="theadRow"></tr></thead><tbody id="tbody"></tbody></table>
  </div>
</div>
<script>
const STEPS=[
  {key:'oa',label:'OA申请',num:1},{key:'sign',label:'协议盖章',num:2},{key:'med',label:'医信申请',num:3},
  {key:'hold',label:'会议举办',num:4},{key:'online',label:'线上材料',num:5},{key:'offline',label:'线下材料',num:6},
  {key:'pay',label:'审核打款',num:7},{key:'invoice',label:'返回发票',num:8},{key:'close',label:'核销',num:9}
];
let meetings=[];
let connected=false;

function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

// ========== API 调用 ==========
async function apiPost(path, data){
  const r=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  return r.json();
}

// ========== SSE 实时连接 ==========
function connectSSE(){
  const evtSource=new EventSource('/api/events');
  evtSource.addEventListener('state',function(e){
    try{
      const d=JSON.parse(e.data);
      if(d.meetings){meetings=d.meetings;render();}
    }catch(err){console.error('SSE parse error:',err)}
  });
  evtSource.onopen=function(){connected=true;updateStatus();};
  evtSource.onerror=function(){connected=false;updateStatus();};
}

function updateStatus(){
  const badge=document.getElementById('statusBadge');
  if(connected){
    badge.className='online-badge on';
    badge.innerHTML='● 已连接 · 实时同步中';
  }else{
    badge.className='online-badge off';
    badge.innerHTML='○ 未连接（正在重连...）';
  }
}

// ========== 操作 ==========
async function addMeeting(){
  const inp=document.getElementById('newName'),name=inp.value.trim();
  if(!name){alert('请输入会议名称');return}
  await apiPost('/api/add',{name});
  inp.value='';
}

async function toggle(mi,sk){
  const m=meetings[mi];
  const steps={...m.steps};
  if(steps[sk]){delete steps[sk]}else{steps[sk]=today()}
  await apiPost('/api/update',{name:m.name,steps});
}

async function delMeeting(i){
  if(!confirm('确定删除「'+meetings[i].name+'」吗？'))return;
  await apiPost('/api/delete',{name:meetings[i].name});
}

async function resetAll(){
  if(!confirm('确定清除所有会议数据吗？此操作不可撤销。'))return;
  for(const m of meetings){
    const steps={};
    STEPS.forEach(s=>{steps[s.key]=null});
    await apiPost('/api/update',{name:m.name,steps});
  }
  for(const m of [...meetings]){
    await apiPost('/api/delete',{name:m.name});
  }
}

function exportCSV(){
  if(!meetings.length){alert('无数据可导出');return}
  let csv='\uFEFF会议名称';STEPS.forEach(s=>{csv+=','+s.label});csv+=',总进度\n';
  meetings.forEach(m=>{
    csv+='"'+m.name.replace(/"/g,'""')+'"';
    STEPS.forEach(s=>{csv+=','+(m.steps[s.key]||'')});
    csv+=','+Math.round(STEPS.filter(s=>m.steps[s.key]).length/STEPS.length*100)+'%\n';
  });
  const b=new Blob([csv],{type:'text/csv;charset=utf-8;'}),a=document.createElement('a');
  a.href=URL.createObjectURL(b);a.download='会议进度表_'+today()+'.csv';a.click();
}

// ========== 渲染 ==========
function render(){
  const doneTotal=meetings.reduce((a,m)=>a+STEPS.filter(s=>m.steps[s.key]).length,0);
  const cellTotal=meetings.length*STEPS.length;
  const allPct=cellTotal>0?Math.round(doneTotal/cellTotal*100):0;
  document.getElementById('statsBar').innerHTML=
    '<div class="stat-card blue"><div class="num">'+meetings.length+'</div><div class="label">会议总数</div></div>'+
    '<div class="stat-card green"><div class="num">'+doneTotal+' / '+cellTotal+'</div><div class="label">已完成步骤</div></div>'+
    '<div class="stat-card green"><div class="num">'+allPct+'%</div><div class="label">整体进度</div></div>'+
    '<div class="stat-card"><div class="num">'+STEPS.length+'</div><div class="label">每会步骤数</div></div>';
  document.getElementById('summaryText').textContent='共 '+meetings.length+' 个会议 · 所有人同步操作，实时更新';

  let th='<th>会议名称</th>';
  STEPS.forEach(s=>{th+='<th>'+s.label+'<span class="step-num">#'+s.num+'</span></th>'});
  th+='<th>进度</th><th></th>';
  document.getElementById('theadRow').innerHTML=th;

  const tbody=document.getElementById('tbody');tbody.innerHTML='';
  if(!meetings.length){
    const tr=document.createElement('tr');
    const td=document.createElement('td');td.colSpan=STEPS.length+3;
    td.style.padding='2.5rem 1rem';td.style.textAlign='center';td.style.color='#94a3b8';td.style.fontSize='.9rem';
    td.textContent='还没有会议，输入名称后点击"添加会议"';
    tr.appendChild(td);tbody.appendChild(tr);return;
  }
  meetings.forEach((m,mi)=>{
    const tr=document.createElement('tr');
    const tdName=document.createElement('td');tdName.textContent=m.name;tr.appendChild(tdName);
    STEPS.forEach(s=>{
      const td=document.createElement('td');
      const btn=document.createElement('button');btn.className='cell-btn'+(m.steps[s.key]?' done':'');
      const ic=document.createElement('span');ic.className='icon';ic.textContent=m.steps[s.key]?'\u2713':'\u25CB';
      btn.appendChild(ic);
      if(m.steps[s.key]){const dl=document.createElement('span');dl.className='date-label';const p=m.steps[s.key].split('-');dl.textContent=p[1]+'/'+p[2];btn.appendChild(dl)}
      btn.addEventListener('click',()=>toggle(mi,s.key));
      td.appendChild(btn);tr.appendChild(td);
    });
    const dc=STEPS.filter(s=>m.steps[s.key]).length,mp=Math.round(dc/STEPS.length*100);
    const tdP=document.createElement('td');
    tdP.innerHTML='<div class="progress-cell"><div class="mini-bar-bg"><div class="mini-bar-fill" style="width:'+mp+'%"></div></div><span class="pct'+(mp===100?' done':'')+'">'+dc+'/'+STEPS.length+' '+mp+'%</span></div>';
    tr.appendChild(tdP);
    const tdA=document.createElement('td');
    tdA.innerHTML='<button class="abtn del" onclick="delMeeting('+mi+')">✕</button>';
    tr.appendChild(tdA);
    tbody.appendChild(tr);
  });
}

// ========== 启动 ==========
connectSSE();
updateStatus();
</script>
</body>
</html>
